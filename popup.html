<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PebbleMsg</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --accent: #d4714e; --star: #f59e0b;
    --fs-sender: 13px;
    --fs-subject: 13px;
    --fs-body: 12px;
    --fs-time: 11px;
    --link: #d4714e;
  }
  :root, [data-theme="light"] {
    --bg: #fff; --text: #1a1a1a; --text2: #666;
    --border: #e5e5e5; --btn-bg: #f5f5f5; --btn-hover: #e8e8e8;
    --shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
  [data-theme="dark"] {
    --bg: #1e1e1e; --text: #e0e0e0; --text2: #999;
    --border: #333; --btn-bg: #2a2a2a; --btn-hover: #383838;
    --shadow: 0 4px 24px rgba(0,0,0,0.45);
  }
  html, body { width:100%; height:100%; overflow:hidden; background:transparent; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:var(--text); }
  #popup-root { width:100%; height:100%; }
  .popup {
    width:100%; height:100%; background:var(--bg); border-radius:8px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .popup-hdr {
    display:flex; align-items:center; gap:8px; padding:10px 12px 4px; flex-shrink:0;
  }
  .popup-hdr.hidden { display:none; }
  .popup-av {
    width:30px; height:30px; min-width:30px; border-radius:50%;
    background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; flex-shrink:0;
  }
  .popup-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:1px; }
  .popup-sender {
    font-weight:600; font-size:var(--fs-sender);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3;
  }
  .popup-sender.hidden { display:none; }
  .popup-time { font-size:var(--fs-time); color:var(--text2); line-height:1.2; }
  .popup-time.hidden { display:none; }
  .popup-close {
    background:none; border:none; cursor:pointer; color:var(--text2);
    width:24px; height:24px; border-radius:4px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .popup-close:hover { background:var(--btn-hover); color:var(--text); }
  .popup-subject {
    padding:8px 12px 2px; font-weight:600; font-size:var(--fs-subject);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; line-height:1.4;
  }
  .popup-subject.hidden { display:none; }
  .popup-body {
    padding:8px 12px 6px; font-size:var(--fs-body);
    color:var(--text2); line-height:1.5; overflow:auto; flex:1; min-height:0;
    white-space:pre-wrap; word-break:break-word;
  }
  .popup-body.hidden { display:none; }
  .popup-body a { color:var(--link); text-decoration:underline; cursor:pointer; }
  .popup-body a:hover { opacity:0.8; }
  .popup-body::-webkit-scrollbar { width:6px; }
  .popup-body::-webkit-scrollbar-track { background:transparent; }
  .popup-body::-webkit-scrollbar-thumb { border-radius:3px; }
  [data-theme="light"] .popup-body::-webkit-scrollbar-thumb { background:#d4d4d4; }
  [data-theme="light"] .popup-body::-webkit-scrollbar-thumb:hover { background:#aaa; }
  [data-theme="dark"] .popup-body::-webkit-scrollbar-thumb { background:#444; }
  [data-theme="dark"] .popup-body::-webkit-scrollbar-thumb:hover { background:#666; }
  .popup-body { scrollbar-width:thin; }
  [data-theme="light"] .popup-body { scrollbar-color:#d4d4d4 transparent; }
  [data-theme="dark"] .popup-body { scrollbar-color:#444 transparent; }
  .popup-actions {
    display:flex; gap:6px; padding:6px 12px 10px; flex-shrink:0;
    border-top:1px solid var(--border);
  }
  .popup-btn {
    flex:1; min-width:0; padding:6px 8px; border-radius:5px;
    border:1px solid var(--border); background:var(--btn-bg); color:var(--text);
    font-size:11px; font-weight:500; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:3px;
    transition:background .15s,border-color .15s; white-space:nowrap;
  }
  .popup-btn:hover { background:var(--btn-hover); border-color:var(--accent); }
  .popup-btn.starred { border-color:var(--star); color:var(--star); }
  .popup-btn svg { width:14px; height:14px; flex-shrink:0; }
</style>
</head>
<body>
<div id="popup-root"></div>
<script type="module">
async function getInvoke() {
  if (window.__TAURI__?.core?.invoke) return window.__TAURI__.core.invoke;
  const m = await import('@tauri-apps/api/core'); return m.invoke;
}
async function loadMsg(invoke) {
  const id = window.__PEBBLE_MSG_ID__;
  if (!id||!invoke) return null;
  try{return await invoke('get_popup_data',{messageId:id})}catch(e){return null}
}
function getCfg() {
  var raw = window.__PEBBLE_CONFIG__;
  if (!raw) return {};
  if (typeof raw === 'object') return raw;
  try { return JSON.parse(raw); } catch(e) { return {}; }
}
function applyTheme() {
  var theme = window.__PEBBLE_THEME__;
  if (!theme) return;
  var resolved = theme === 'system'
    ? (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
    : theme;
  document.documentElement.setAttribute('data-theme', resolved);

  var sbId = 'sb-theme-inject';
  var sbEl = document.getElementById(sbId);
  if (!sbEl) { sbEl = document.createElement('style'); sbEl.id = sbId; document.head.appendChild(sbEl); }
  if (resolved === 'dark') {
    sbEl.textContent = '.popup-body::-webkit-scrollbar-thumb{background:#444!important}.popup-body::-webkit-scrollbar-thumb:hover{background:#666!important}.popup-body{scrollbar-color:#444 transparent!important}';
  } else {
    sbEl.textContent = '.popup-body::-webkit-scrollbar-thumb{background:#d4d4d4!important}.popup-body::-webkit-scrollbar-thumb:hover{background:#aaa!important}.popup-body{scrollbar-color:#d4d4d4 transparent!important}';
  }
}
function fmt(t) {
  if(!t)return''; var d=new Date(t*1000),n=new Date(),m=Math.floor((n-d)/60000);
  if(m<1)return'just now'; if(m<60)return m+'m ago';
  if(m<1440)return Math.floor(m/60)+'h ago'; return d.toLocaleDateString()
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function applyFontSize(cfg) {
  var root = document.documentElement;
  if(cfg.font_size_sender) root.style.setProperty('--fs-sender', cfg.font_size_sender+'px');
  if(cfg.font_size_subject) root.style.setProperty('--fs-subject', cfg.font_size_subject+'px');
  if(cfg.font_size_snippet) root.style.setProperty('--fs-body', cfg.font_size_snippet+'px');
  if(cfg.font_size_time) root.style.setProperty('--fs-time', cfg.font_size_time+'px');
}

var URL_RE = /(https?:\/\/[^\s<]+)/gi;

function linkifyBody(text) {
  if (!text) return '';
  return esc(text).replace(URL_RE, function(url) {
    return '<a href="'+url+'" target="_blank" rel="noopener" data-url="'+url+'">'+url+'</a>';
  });
}

function makeBodyText(msg, cfg) {
  var text = msg.body_text || msg.snippet || '';
  if (!text) return '';
  var maxLen = cfg.font_size_snippet && cfg.font_size_snippet > 16 ? 300 : 500;
  if (text.length > maxLen) {
    text = text.slice(0, maxLen).replace(/\n\S*$/, '') + '\u2026';
  }
  return text;
}

function render(msg,invoke,cfg){
  var r=document.getElementById('popup-root');
  if(!msg){r.innerHTML='<div style="text-align:center;padding:20px;font-size:12px;color:var(--text2)">No message data</div>';return}

  applyTheme();
  applyFontSize(cfg);

  var ini=(msg.sender_name||msg.sender_address||'?')[0].toUpperCase();
  var sn=msg.sender_name||msg.sender_address||'Unknown';
  var tm=fmt(msg.received_at);
  var sj=msg.subject||'(No subject)';
  var rawBody=makeBodyText(msg, cfg);
  var body=linkifyBody(rawBody);
  var isTest=msg.message_id&&msg.message_id.startsWith('test-');
  var mid=msg.message_id, aid=msg.account_id;
  var sI=invoke||(()=>Promise.reject(new Error('no tauri')));

  var sSdr=cfg.show_sender===true, sSub=cfg.show_subject===true;
  var sSnp=cfg.show_snippet===true, sTim=cfg.show_time===true;
  var showHdr = sSdr || sTim;
  var star=msg.is_starred;

  r.innerHTML='<div class="popup">'+
    '<div class="popup-hdr'+(showHdr?'':' hidden')+'">'+
      '<div class="popup-av">'+esc(ini)+'</div>'+
      '<div class="popup-info">'+
        '<div class="popup-sender'+(sSdr?'':' hidden')+'">'+esc(sn)+'</div>'+
        '<div class="popup-time'+(sTim?'':' hidden')+'">'+esc(tm)+'</div>'+
      '</div>'+
      '<button class="popup-close" id="btn-close" title="Close">&times;</button>'+
    '</div>'+
    '<div class="popup-subject'+(sSub?'':' hidden')+'">'+esc(sj)+'</div>'+
    '<div class="popup-body'+(sSnp?'':' hidden')+'">'+body+'</div>'+
    '<div class="popup-actions">'+
      '<button class="popup-btn" id="btn-read">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'+
        'Read'+
      '</button>'+
      '<button class="popup-btn'+(star?' starred':'')+'" id="btn-star">'+
        '<svg viewBox="0 0 24 24" fill="'+(star?'currentColor':'none')+'" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'+
        (star?'Starred':'Star')+
      '</button>'+
      '<button class="popup-btn" id="btn-kanban">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>'+
        'Board'+
      '</button>'+
    '</div>'+
  '</div>';

  r.querySelector('#btn-close').addEventListener('click',function(){sI('close_popup',{messageId:mid}).catch(function(){})});

  r.querySelector('#btn-read').addEventListener('click',async function(){
    if(!isTest&&aid) try{await sI('update_message_flags',{messageId:mid,isRead:true,isStarred:null})}catch(e){console.warn(e)}
    sI('close_popup',{messageId:mid}).catch(function(){})
  });

  r.querySelector('#btn-star').addEventListener('click',async function(){
    if(!isTest&&aid){
      try{
        await sI('update_message_flags',{messageId:mid,isRead:null,isStarred:!star});
        star=!star;var b=r.querySelector('#btn-star');
        b.classList.toggle('starred',star);b.querySelector('svg').setAttribute('fill',star?'currentColor':'none');
        b.childNodes[b.childNodes.length-1].textContent=star?'Starred':'Star';
      }catch(e){console.warn(e)}
    }
  });

  r.querySelector('#btn-kanban').addEventListener('click',async function(){
    if(!isTest&&aid) try{await sI('move_to_kanban',{messageId:mid,column:'todo',position:null})}catch(e){console.warn(e)}
    sI('close_popup',{messageId:mid}).catch(function(){})
  });

  var bodyEl = r.querySelector('.popup-body');
  if (bodyEl) {
    bodyEl.addEventListener('click',function(e){
      var a = e.target.closest('a');
      if (!a) return;
      e.preventDefault();
      e.stopPropagation();
      var url = a.dataset.url || a.getAttribute('href');
      if (url) { sI('open_external_url',{url:url}).catch(function(){}); }
    });
  }

  r.querySelector('.popup').addEventListener('click',function(e){
    if(e.target.closest('button')||e.target.closest('a'))return;
    if(!isTest&&aid) sI('popup_open_message',{messageId:mid,accountId:aid}).catch(function(){});
    else sI('close_popup',{messageId:mid}).catch(function(){});
  });
}

getInvoke().then(function(inv){loadMsg(inv).then(function(m){render(m,inv,getCfg())}).catch(function(){render(null,inv,getCfg())})}).catch(function(){render(null,null,getCfg())});
</script>
</body>
</html>
